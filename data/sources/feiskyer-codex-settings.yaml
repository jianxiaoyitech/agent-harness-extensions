version: 1
id: feiskyer-codex-settings
name: feiskyer Codex Settings
status: active
repo: https://github.com/feiskyer/codex-settings
compatibility:
  claude-code: blank
  codex: check
  cursor: blank
  windsurf: blank
  github-copilot: blank
  openclaw: blank
  qoder-cli: blank
  kiro-cli: blank
  amp: blank
  auggie-cli: blank
  codebuddy-cli: blank
  roo-code: blank
  gemini-cli: blank
  forge: blank
  ibm-bob: blank
  jules: blank
  kilo-code: blank
  opencode: blank
  pi: blank
  qwen-code: blank
  shai: blank
  tabnine-cli: blank
  mistral-vibe: blank
  kimi-code: blank
  iflow-cli: blank
  junie: blank
allowed_types:
  - skill
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - "skills/*/SKILL.md"
    - ".codex/skills/*/SKILL.md"
  path_regex:
    - pattern: "^(?:\\.codex/)?skills/[^/]+/SKILL\\.md$"
      type: skill
artifacts: []
exclusions:
  paths:
    - "examples/**"
    - "tests/**"
  artifacts: []
metadata:
  notes: "Community Codex settings and skills repo."
