version: 1
id: wshobson-agents
name: wshobson Agents
status: active
repo: https://github.com/wshobson/agents
compatibility:
  claude-code: check
allowed_types:
  - agent
  - plugin
  - skill
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - "plugins/*/.claude-plugin/plugin.json"
    - "plugins/*/agents/*.md"
    - "plugins/*/skills/**/SKILL.md"
  path_regex:
    - pattern: "^plugins/[^/]+/\\.claude-plugin/plugin\\.json$"
      type: plugin
    - pattern: "^plugins/[^/]+/agents/[^/]+\\.md$"
      type: agent
    - pattern: "^plugins/[^/]+/skills/(?:[^/]+/)*SKILL\\.md$"
      type: skill
artifacts: []
exclusions:
  paths:
    - "docs/**"
    - "**/README.md"
  artifacts: []
metadata:
  notes: "Claude Code plugin marketplace with plugin manifests, agent profiles, and nested skills."
