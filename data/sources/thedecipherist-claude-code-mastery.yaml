version: 1
id: thedecipherist-claude-code-mastery
name: Claude Code Mastery
status: active
repo: https://github.com/TheDecipherist/claude-code-mastery
compatibility:
  claude-code: check
allowed_types:
  - skill
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - "SKILL.md"
    - ".codex/skills/*/SKILL.md"
    - "skills/*/SKILL.md"
    - "skills/.curated/*/SKILL.md"
    - "skills/.experimental/*/SKILL.md"
    - "skills/.system/*/SKILL.md"
  path_regex:
    - pattern: "^(?:\\.codex/)?skills/(?:\\.[^/]+/)?[^/]+/SKILL\\.md$"
      type: skill
    - pattern: "^SKILL\\.md$"
      type: skill
artifacts:
  - name: Claude Code Mastery
    type: skill
    path: README.md
exclusions:
  paths:
    - ".github/**"
    - "**/test/**"
    - "**/tests/**"
    - "**/examples/**"
  artifacts: []
metadata:
  notes: "Claude Code skill and workflow repository discovered from GitHub search."
