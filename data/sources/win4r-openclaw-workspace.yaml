version: 1
id: win4r-openclaw-workspace
name: OpenClaw Workspace
status: active
repo: https://github.com/win4r/openclaw-workspace
compatibility:
  openclaw: check
  codex: question
allowed_types:
  - skill
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - "SKILL.md"
    - ".codex/skills/*/SKILL.md"
    - "skills/*/SKILL.md"
    - "skills/.curated/*/SKILL.md"
    - "skills/.experimental/*/SKILL.md"
    - "skills/.system/*/SKILL.md"
  path_regex:
    - pattern: "^(?:\\.codex/)?skills/(?:\\.[^/]+/)?[^/]+/SKILL\\.md$"
      type: skill
    - pattern: "^SKILL\\.md$"
      type: skill
artifacts:
  - name: OpenClaw Workspace
    type: skill
    path: README.md
exclusions:
  paths:
    - ".github/**"
    - "**/test/**"
    - "**/tests/**"
    - "**/examples/**"
  artifacts: []
metadata:
  notes: "OpenClaw-oriented skills workspace discovered from GitHub search."
