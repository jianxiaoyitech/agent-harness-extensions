version: 1
id: antvis-mcp-server-chart
name: Chart MCP Server
status: active
repo: https://github.com/antvis/mcp-server-chart
compatibility:
  claude-code: check
  codex: check
  cursor: check
  github-copilot: check
  gemini-cli: check
  openclaw: check
  opencode: check
  windsurf: check
allowed_types:
  - mcp-server
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - ".mcp.json"
    - "**/.mcp.json"
  path_regex:
    - pattern: "^\\.mcp\\.json$"
      type: mcp-server
    - pattern: "^(?:.+/)?\\.mcp\\.json$"
      type: mcp-server
artifacts:
  - name: Chart MCP Server
    type: mcp-server
    path: README.md
exclusions:
  paths: []
  artifacts: []
metadata:
  notes: "MCP server repository discovered from GitHub search."
