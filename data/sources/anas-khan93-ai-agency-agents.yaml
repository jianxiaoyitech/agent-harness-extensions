version: 1
id: anas-khan93-ai-agency-agents
name: AI Agency Agents
status: active
repo: https://github.com/Anas-Khan93/ai-agency-agents
compatibility:
  claude-code: check
  codex: check
  cursor: check
  openclaw: check
  windsurf: check
allowed_types:
  - agent
discovery:
  manifests: true
  conventions: true
  regex: true
  path_patterns:
    - "academic/*.md"
    - "design/*.md"
    - "engineering/*.md"
    - "game-development/*.md"
    - "game-development/*/*.md"
    - "marketing/*.md"
    - "paid-media/*.md"
    - "product/*.md"
    - "project-management/*.md"
    - "sales/*.md"
    - "spatial-computing/*.md"
    - "specialized/*.md"
    - "strategy/*.md"
    - "support/*.md"
    - "testing/*.md"
  path_regex:
    - pattern: "^(?:academic|design|engineering|game-development|marketing|paid-media|product|project-management|sales|spatial-computing|specialized|strategy|support|testing)/(?:[^/]+/)?[^/]+\\.md$"
      type: agent
artifacts: []
exclusions:
  paths:
    - "**/README.md"
    - ".github/**"
    - "examples/**"
    - "integrations/**"
    - "strategy/**"
  artifacts: []
metadata:
  notes: "Agency-style agent profile repository with categorized markdown agent definitions."
