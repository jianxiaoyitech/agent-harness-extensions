name: Source request
description: Request a new source or directory input to be tracked.
title: "[Source]: "
labels:
  - source-request
body:
  - type: input
    id: repo_url
    attributes:
      label: Repository or source URL
      placeholder: https://github.com/owner/repo
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this be tracked?
      description: Explain what the source contains and why it fits the directory.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Optional harness compatibility, examples, or source layout notes.
