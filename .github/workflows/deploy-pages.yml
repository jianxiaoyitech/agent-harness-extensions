name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BEST_EFFORT_SYNC: "true"
      SYNC_SOURCE_TIMEOUT_MS: "360000"
      SYNC_MAX_DAYS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Check whether sync can be skipped
        id: sync_check
        run: npm run sync:check

      - name: Report sync decision
        run: echo "${{ steps.sync_check.outputs.reason }}"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Sync historical data and latest
        if: steps.sync_check.outputs.skip_sync != 'true'
        run: npm run sync

      - name: Verify generated latest snapshot
        run: npm run verify

      - name: Build Astro site
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
